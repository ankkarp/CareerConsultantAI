create_roadmap_no_context_prompt: >
  Ты — опытный карьерный консультант и ментор. Составь четкий, практический план получения профессии <profession> для пользователя.
  
  ОПИСАНИЕ ПРОФЕССИИ:
  
  <about_profession>
  
  ИНФОРМАЦИЯ О ПОЛЬЗОВАТЕЛЕ:
  
  <who_user>
  <about_user>
  
  ---
  
  ИНСТРУКЦИЯ К ВЫПОЛНЕНИЮ:
  
  1. Проанализируй контекст: Сравни цели пользователя, его текущий уровень и возможности с предложениями на рынке образования (курсы, вузы).
  2. Выбери оптимальный путь: Прими решение, что лучше рекомендовать — курсы, университет или комбинированный путь. Кратко обоснуй свой выбор (1-2 предложения).
  3. Составь план: Представь план в виде четких, последовательных шагов и конкретных действий. Порекомендуй именно те навыки, которые нужны пользователю для освоения профессии
  
  ---

  Составь ответ СТРОГО в следующей структуре, без лишних вступлений и заключений:
  План действий:


    1. Шаг 1, короткое емкое описание
      - элементы Шага 1
    
    2. Шаг 2, короткое емкое описание
      - элементы Шага 2
    
    ...
  
  ОФОРМЛЕНИЕ ОТВЕТА: Будь конкретным, практичным и избегай общих фраз. Используй четкие формулировки. Не превышай лимит в 1000 символов
  ВСЕГДА используй символ "-" как маркер списка 

"prof_tests_description": {
                            "Тест Якоря карьеры Шейна": "Эта методика фокусируется на глубинных карьерных ценностях и мотивах 
                            человека — его «якорях». Она помогает понять, что для человека по-настоящему важно в работе: 
                            стабильность, вызов, служение другим, предпринимательство и т.д. Идеальна для людей, которые 
                            хотят понять свои неудовлетворенные потребности в карьере или находятся в поиске себя. Особенно 
                            хорошо подходит для творческих личностей и тех, кто ориентирован на помощь людям, так как их 
                            мотивация часто лежит в нематериальной сфере. Целевой пользователь: Студент, работающий 
                            взрослый (чаще те, кто чувствует неудовлетворенность текущей работой)",

                            "Тест Климова": "Классическая методика, определяющая склонность к одному из пяти типов 
                            профессий: \"человек-человек\", \"человек-техника\", \"человек-знаковая система\", 
                            \"человек-художественный образ\", \"человек-природа\". Отлично подходит для первичной 
                            ориентировки в мире профессий. Ее главное преимущество — простота и наглядность. Целевой 
                            пользователь: Школьник, студент младших курсов (те, кто только начинает выбирать путь)",

                            "Тест MBTI": "Эта методика определяет тип личности на основе четырех шкал: 
                            экстраверсия/интроверсия, сенсорика/интуиция, логика/этика, рациональность/иррациональность. 
                            Она полезна для понимания своего стиля коммуникации, принятия решений и взаимодействия с 
                            миром. Незаменима для тех, кто работает в команде, хочет улучшить навыки общения или понять 
                            причины конфликтов. Целевой пользователь: Студент, работающий взрослый 
                            (особенно в сферах, требующих общения, менеджмента, проектной работы).",

                            "Тест Холланда/RIASEC": "Методика, классифицирующая людей 
                            по 6 типам профессионального интереса: Реалистический, Исследовательский, 
                            Артистический, Социальный, Предприимчивый, Конвенциональный. Она помогает не 
                            просто выбрать одну профессию, а найти целую группу подходящих профессий, 
                            комбинируя коды (например, IRS). Более современная и детальная альтернатива тесту Климова. 
                            Целевой пользователь: Школьник, студент, взрослый, желающий сменить сферу деятельности.",

                            "Тест PCM": "Эта методика фокусируется на стилях коммуникации и поведении в команде. Она 
                            определяет, к какому типу личности вы относитесь, и рассказывает, как вам лучше всего 
                            общаться с другими типами, чтобы избегать конфликтов и повышать эффективность. Идеальна 
                            для тех, кто работает в коллективе, управляет людьми или хочет улучшить личные отношения. 
                            Целевой пользователь: Работающий взрослый (менеджеры, руководители, члены проектных команд), 
                            студент, участвующий в групповых проектах."
}

