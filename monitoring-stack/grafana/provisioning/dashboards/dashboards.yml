apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    # ДОБАВЬТЕ ЭТО:
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      # ДОБАВЬТЕ ЭТУ СТРОЧКУ:
      foldersFromFilesStructure: true