global:
  scrape_interval: 15s  # Частота сбора метрик
  evaluation_interval: 15s

# Правила алертинга (пока оставим пустым, можно добавить позже)
rule_files:
  # - "alert.rules"

# Конфигурация самого Prometheus
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # LLM сервис
  - job_name: 'llm-service'
    static_configs:
      - targets: ['host.docker.internal:8000']
    scrape_interval: 5s

  # Можно добавить мониторинг системы
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']